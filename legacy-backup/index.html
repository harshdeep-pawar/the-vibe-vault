// ==================== MAIN APP ====================
var App = function() {
  var _theme = useState(function() {
    var s = window.localStorage.getItem('vv-theme');
    return s === 'light' ? 'light' : 'dark';
  }), theme = _theme[0], setTheme = _theme[1];
  var _sq = useState(''), sq = _sq[0], setSq = _sq[1];
  var _qv = useState(null), quickViewProduct = _qv[0], setQuickViewProduct = _qv[1];

  useEffect(function() {
    document.body.classList.toggle('theme-light', theme === 'light');
    window.localStorage.setItem('vv-theme', theme);
  }, [theme]);

  // Magnetic Button Interactions Hook
  useEffect(function() {
    if (window.matchMedia('(hover: none)').matches) return;
    
    var handleMouseMove = function(ev) {
      var btn = ev.currentTarget;
      var rect = btn.getBoundingClientRect();
      var x = ev.clientX - rect.left - rect.width/2;
      var y = ev.clientY - rect.top - rect.height/2;
      
      gsap.to(btn, {
        x: x * 0.35,
        y: y * 0.35,
        duration: 0.3,
        ease: 'power2.out'
      });
    };

    var handleMouseLeave = function(ev) {
      var btn = ev.currentTarget;
      gsap.to(btn, {
        x: 0,
        y: 0,
        duration: 0.5,
        ease: 'elastic.out(1.1, 0.4)'
      });
    };

    var updateListeners = function() {
      var btns = document.querySelectorAll('.magnetic-btn');
      btns.forEach(function(btn) {
        btn.addEventListener('mousemove', handleMouseMove);
        btn.addEventListener('mouseleave', handleMouseLeave);
      });
    };

    // Run immediately and setup MutationObserver to bind dynamically added buttons
    updateListeners();
    var observer = new MutationObserver(updateListeners);
    observer.observe(document.body, { childList: true, subtree: true });

    return function() {
      observer.disconnect();
      var btns = document.querySelectorAll('.magnetic-btn');
      btns.forEach(function(btn) {
        if (btn) {
          btn.removeEventListener('mousemove', handleMouseMove);
          btn.removeEventListener('mouseleave', handleMouseLeave);
        }
      });
    };
  }, []);

  useEffect(function() {
    var handler = function(ev) {
      var t = ev.target;
      while (t && t.tagName !== 'A') t = t.parentElement;
      if (t && t.tagName === 'A') {
        var href = t.getAttribute('href');
        if (href && href.startsWith('#')) {
          var el = document.getElementById(href.slice(1));
          if (el) { ev.preventDefault(); el.scrollIntoView({ behavior: 'smooth' }); }
        }
      }
    };
    document.addEventListener('click', handler);
    return function() { document.removeEventListener('click', handler); };
  }, []);

  return e('div', { className: 'page' },
    e(Navbar, { theme: theme, onToggleTheme: function() { setTheme(function(p) { return p === 'light' ? 'dark' : 'light'; }); }, searchQuery: sq, setSearchQuery: setSq, onSearch: function() { var el = document.getElementById('categories'); if (el) el.scrollIntoView({ behavior: 'smooth' }); } }),
    e(Hero),
    e(Categories, { searchQuery: sq, onQuickView: setQuickViewProduct }),
    e(Gallery),
    e(Featured),
    e(Statistics),
    e(WhyChoose),
    e(About),
    e(Testimonials),
    e(Newsletter),
    e(Contact),
    e(Footer),
    e(WhatsAppFloat),
    e(ChatBot),
    quickViewProduct && e(QuickViewModal, { product: quickViewProduct, onClose: function() { setQuickViewProduct(null); } })
  );
};

// Lenis Smooth Scroll
var lenis;
(function() {
  if (typeof Lenis !== 'undefined') {
    lenis = new Lenis({
      duration: 1.2,
      easing: function(t) { return Math.min(1, 1.001 - Math.pow(2, -10 * t)); },
      direction: 'vertical',
      gestureDirection: 'vertical',
      smooth: true,
      mouseMultiplier: 1.0,
      smoothTouch: false,
      touchMultiplier: 2.0,
      infinite: false,
    });

    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    if (typeof ScrollTrigger !== 'undefined') {
      lenis.on('scroll', ScrollTrigger.update);
    }
  }
})();

// Preloader
(function() {
  var fill = document.getElementById('preloader-fill');
  var pct = document.getElementById('preloader-percent');
  var loader = document.getElementById('preloader');
  var phrase = document.getElementById('preloader-phrase');
  var progress = 0;
  
  var preloaderPhrases = [
    "Curating vibes...",
    "Selecting premium fabrics...",
    "Stitching streetwear staples...",
    "Ready to drop..."
  ];

  var interval = setInterval(function() {
    progress += Math.random() * 12 + 4;
    if (progress > 95) progress = 95;
    if (fill) fill.style.width = progress + '%';
    if (pct) pct.textContent = Math.floor(progress) + '%';
    
    // Rotate phrases based on percentage
    if (phrase) {
      var idx = Math.floor((progress / 100) * preloaderPhrases.length);
      phrase.textContent = preloaderPhrases[idx] || preloaderPhrases[preloaderPhrases.length - 1];
    }
  }, 150);

  window.addEventListener('load', function() {
    clearInterval(interval);
    if (fill) fill.style.width = '100%';
    if (pct) pct.textContent = '100%';
    if (phrase) phrase.textContent = "Welcome to The Vibe Vault";
    setTimeout(function() {
      if (loader) loader.classList.add('hidden');
      document.body.classList.remove('loading');
    }, 700);
  });
})();

// Scroll Progress
(function() {
  var bar = document.getElementById('scroll-progress');
  window.addEventListener('scroll', function() {
    var h = document.documentElement.scrollHeight - window.innerHeight;
    if (bar && h > 0) bar.style.width = (window.scrollY / h * 100) + '%';
  });
})();

// Custom Cursor with trailing effect
(function() {
  var cursor = document.getElementById('cursor-glow');
  if (!cursor || window.matchMedia('(hover: none)').matches) return;
  var cx = 0, cy = 0, tx = 0, ty = 0;
  document.addEventListener('mousemove', function(ev) { tx = ev.clientX; ty = ev.clientY; });
  (function loop() {
    cx += (tx - cx) * 0.15;
    cy += (ty - cy) * 0.15;
    cursor.style.left = cx + 'px';
    cursor.style.top = cy + 'px';
    requestAnimationFrame(loop);
  })();
  document.addEventListener('mouseover', function(ev) {
    var t = ev.target;
    if (t.closest('.card') || t.closest('.gallery-item') || t.closest('.swiper-slide')) {
      cursor.classList.add('hovering-view');
      cursor.innerHTML = '<span class="cursor-text">VIEW</span>';
    } else if (t.tagName === 'A' || t.tagName === 'BUTTON' || t.closest('a') || t.closest('button') || t.closest('.feature') || t.closest('.stat-card')) {
      cursor.classList.add('hovering');
      cursor.innerHTML = '';
    }
  });
  document.addEventListener('mouseout', function(ev) {
    cursor.classList.remove('hovering');
    cursor.classList.remove('hovering-view');
    cursor.innerHTML = '';
  });
})();

// Mouse Gradient Follower
(function() {
  var grad = document.getElementById('mouse-gradient');
  if (!grad || window.matchMedia('(hover: none)').matches) return;
  document.addEventListener('mousemove', function(ev) {
    grad.style.left = ev.clientX + 'px';
    grad.style.top = ev.clientY + 'px';
  });
})();

// Particle Canvas Connection system
(function() {
  var canvas = document.getElementById('particles');
  if (!canvas || window.matchMedia('(hover: none)').matches) return;
  var ctx = canvas.getContext('2d');
  var particles = [];
  var count = 35;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      size: Math.random() * 2 + 1.2,
      opacity: Math.random() * 0.35 + 0.15
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw lines between nearby particles
    for (var a = 0; a < count; a++) {
      for (var b = a + 1; b < count; b++) {
        var dx = particles[a].x - particles[b].x;
        var dy = particles[a].y - particles[b].y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          ctx.beginPath();
          ctx.moveTo(particles[a].x, particles[a].y);
          ctx.lineTo(particles[b].x, particles[b].y);
          ctx.strokeStyle = 'rgba(201, 169, 97, ' + (0.12 * (1 - dist / 100)) + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    particles.forEach(function(p) {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(201, 169, 97, ' + p.opacity + ')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// GSAP ScrollTrigger Animations
(function() {
  if (typeof gsap === 'undefined' || typeof ScrollTrigger === 'undefined') return;
  gsap.registerPlugin(ScrollTrigger);

  // Stagger reveal sections
  gsap.utils.toArray('section').forEach(function(section) {
    gsap.fromTo(section, { opacity: 0, y: 50 }, {
      opacity: 1,
      y: 0,
      duration: 1.2,
      ease: 'power3.out',
      scrollTrigger: {
        trigger: section,
        start: 'top 88%',
        toggleActions: 'play none none none'
      }
    });
  });

  // Stagger headings (split-like character stagger)
  gsap.utils.toArray('.section-title').forEach(function(title) {
    gsap.fromTo(title, { opacity: 0, y: 25 }, {
      opacity: 1,
      y: 0,
      duration: 0.8,
      ease: 'power2.out',
      scrollTrigger: {
        trigger: title,
        start: 'top 92%'
      }
    });
  });

  // Stagger categories/product cards
  gsap.utils.toArray('.grid').forEach(function(grid) {
    gsap.fromTo(grid.children, { opacity: 0, y: 40, scale: 0.96 }, {
      opacity: 1,
      y: 0,
      scale: 1,
      duration: 0.8,
      stagger: 0.08,
      ease: 'power3.out',
      scrollTrigger: {
        trigger: grid,
        start: 'top 85%'
      }
    });
  });

  // Gallery lookbook items parallax
  gsap.utils.toArray('.gallery-item').forEach(function(item, i) {
    gsap.fromTo(item, { opacity: 0, scale: 0.94 }, {
      opacity: 1,
      scale: 1,
      duration: 0.8,
      delay: i * 0.08,
      ease: 'power2.out',
      scrollTrigger: {
        trigger: item,
        start: 'top 90%'
      }
    });
  });

  // Feature cards stagger
  gsap.utils.toArray('.features').forEach(function(feats) {
    gsap.fromTo(feats.children, { opacity: 0, y: 35 }, {
      opacity: 1,
      y: 0,
      duration: 0.8,
      stagger: 0.1,
      ease: 'power3.out',
      scrollTrigger: {
        trigger: feats,
        start: 'top 88%'
      }
    });
  });

  // Statistics counters
  gsap.utils.toArray('.stat-card').forEach(function(card, i) {
    gsap.fromTo(card, { opacity: 0, scale: 0.9 }, {
      opacity: 1,
      scale: 1,
      duration: 0.65,
      delay: i * 0.08,
      ease: 'back.out(1.4)',
      scrollTrigger: {
        trigger: card,
        start: 'top 92%'
      }
    });
  });
})();
